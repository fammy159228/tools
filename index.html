<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具箱 | My Toolbox</title>
    <style>
        /* 基礎樣式設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            width: 90%;
            margin: 2rem 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* 工具卡片樣式 */
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 1px solid #3498db;
        }

        .card h3 {
            margin-top: 0;
            color: #2980b9;
        }

        .card p {
            font-size: 0.9rem;
            color: #666;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>我的小工具集合</h1>
        <p>點擊下方卡片即可開始使用</p>
    </header>

    <div class="container">
        <a href="./gmt_regions/" class="card">
            <h3>時區顯示器</h3>
            <p>輔助切換遊戲時區。</p>
        </a>

        <a href="./tool-02/" class="card">
            <h3>健身用計時器</h3>
            <p>計時運動時間，循環倒數計時輔助組間休息，顯示在螢幕中下方，上方可以放 Youtube 小螢幕。</p>
        </a>

        <a href="./mushroom/" class="card">
            <h3>蘑菇倒數計時器</h3>
            <p>皮克敏輔助打蘑菇倒數時間的小工具。</p>
        </a>
    </div>

    <footer>
        &copy; 2026 由 GitHub Pages 強力驅動
    </footer>

</body>
</html>
