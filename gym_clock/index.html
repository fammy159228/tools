<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>碼表</title>
    <style>
        /* 重置基本樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            height: 100vh; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
        }

        /* 顯示區容器 */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column; 
            align-items: center;    
            justify-content: center; /* 改為置中，讓版面更平衡 */
            padding-top: 6vh; 
            gap: 5px; 
            width: 100%;
        }

        /* 主碼表 */
        .stopwatch-text {
            font-size: clamp(4rem, 13vw, 10rem); 
            font-weight: 300;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
            margin-bottom: 0px;
        }

        /* 2x2 倒數計時器網格 */
        .countdown-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 建立兩欄等寬 */
            gap: 0px 0px; /* 上下間隔 20px，左右間隔 40px */
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        /* 倒數計時器共用樣式 */
        .countdown-item {
            font-size: clamp(4rem, 13vw, 10rem);  /* 稍微縮小字體以適應並排 */
            font-weight: 300;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
        }

        /* 個別倒數計時器顏色 */
        #countdown-1m { color: #2ecc71; }   /* 綠色 */
        #countdown-1-5m { color: #9b59b6; } /* 紫色 */
        #countdown-2m { color: #f39c12; }   /* 橘色 */
        #countdown-2-5m { color: #3498db; } /* 藍色 */

        /* 現在時間 */
        .clock-text {
            font-size: clamp(4rem, 13vw, 10rem); 
            font-weight: 300;
            color: #cccccc; 
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
            margin-top: 0px; 
        }

        /* 按鈕控制區 */
        .controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            padding: 30px 20px 50px 20px; 
            background-color: #2a2a2a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        /* 按鈕共用樣式 */
        button {
            flex: 1;
            max-width: 150px; 
            padding: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.95); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* 個別按鈕顏色 */
        #pauseBtn { background-color: #f39c12; }
        #startBtn { background-color: #27ae60; }
        #resetBtn { background-color: #e74c3c; }

        /* 手機微調 */
        @media (max-width: 350px) {
            button {
                font-size: 1rem;
                padding: 12px 0;
            }
            .controls-container { gap: 10px; }
            .countdown-grid { gap: 10px 20px; }
        }
    </style>
</head>
<body>

    <div class="display-container">
        <!-- 最上方：主碼表 -->
        <div class="stopwatch-text" id="display">00:00:00</div>
        
        <!-- 中間：2x2 倒數計時網格 -->
        <div class="countdown-grid">
            <div class="countdown-item" id="countdown-1m">1:00</div>
            <div class="countdown-item" id="countdown-1-5m">1:30</div>
            <div class="countdown-item" id="countdown-2m">2:00</div>
            <div class="countdown-item" id="countdown-2-5m">2:30</div>
        </div>

        <!-- 最下方：現在時間 -->
        <div class="clock-text" id="clock">00:00:00</div>
    </div>

    <div class="controls-container">
        <button id="pauseBtn" disabled>暫停</button>
        <button id="startBtn">開始</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        // 取得 DOM 元素
        const display = document.getElementById('display');
        const countdown1m = document.getElementById('countdown-1m');
        const countdown1_5m = document.getElementById('countdown-1-5m');
        const countdown2m = document.getElementById('countdown-2m');
        const countdown2_5m = document.getElementById('countdown-2-5m');
        const clockDisplay = document.getElementById('clock');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;

        // ---- 現在時間功能 ----
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            clockDisplay.textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 

        // ---- 碼表與循環倒數功能 ----
        
        // 輔助函式：計算循環倒數並回傳格式化字串 (M:SS，分鐘不補 0)
        function formatCountdown(cycleSeconds, totalSecondsPassed) {
            const elapsedInCycle = totalSecondsPassed % cycleSeconds;
            const remainingSeconds = cycleSeconds - elapsedInCycle;
            
            // 分鐘只取數字不使用 padStart，確保開頭不會有 0
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = String(remainingSeconds % 60).padStart(2, '0');
            
            return `${minutes}:${seconds}`;
        }

        // 格式化時間並更新畫面 
        function updateDisplay(time) {
            // 1. 更新主碼表 (格式: HH:MM:SS)
            const hours = String(Math.floor(time / 3600000)).padStart(2, '0');
            const minutes = String(Math.floor((time % 3600000) / 60000)).padStart(2, '0');
            const seconds = String(Math.floor((time % 60000) / 1000)).padStart(2, '0');
            display.textContent = `${hours}:${minutes}:${seconds}`;

            const totalSecondsPassed = Math.floor(time / 1000); 

            // 2. 統一更新四個循環倒數
            countdown1m.textContent = formatCountdown(60, totalSecondsPassed);     // 1分鐘 (60秒)
            countdown1_5m.textContent = formatCountdown(90, totalSecondsPassed);   // 1.5分鐘 (90秒)
            countdown2m.textContent = formatCountdown(120, totalSecondsPassed);    // 2分鐘 (120秒)
            countdown2_5m.textContent = formatCountdown(150, totalSecondsPassed);  // 2.5分鐘 (150秒)
        }

        // 計時器循環函式
        function update() {
            elapsedTime = Date.now() - startTime;
            updateDisplay(elapsedTime);
            timerInterval = requestAnimationFrame(update);
        }

        // 開始按鈕邏輯
        function start() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime; 
                timerInterval = requestAnimationFrame(update);
                isRunning = true;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
            }
        }

        // 暫停按鈕邏輯
        function pause() {
            if (isRunning) {
                cancelAnimationFrame(timerInterval);
                isRunning = false;
                startBtn.disabled = false;
                pauseBtn.disabled = true;
            }
        }

        // 重置按鈕邏輯
        function reset() {
            cancelAnimationFrame(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            updateDisplay(elapsedTime);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        startBtn.addEventListener('click', start);
        pauseBtn.addEventListener('click', pause);
        resetBtn.addEventListener('click', reset);
    </script>
</body>
</html>
