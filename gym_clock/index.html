<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>碼表</title>
    <style>
        /* 重置基本樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            /* 讓 body 填滿整個可見視窗高度 */
            height: 100vh; 
            /* 解決行動版瀏覽器網址列導致的 vh 偏差 */
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 將內容推向上下兩端 */
        }

        /* 碼表與時間顯示區 (最上方) */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column; /* 改為垂直排列 */
            align-items: center;    /* 垂直排列時置中 */
            justify-content: flex-start;
            padding-top: 17vh; /* 距離頂部一些空間 */
            gap: 1px; /* 元素之間的間隔 */
        }

        /* 主碼表 */
        .stopwatch-text {
            /* 使用 clamp 讓字體在手機與 PC 之間自動縮放 */
            font-size: clamp(4rem, 15vw, 10rem); 
            font-weight: 300;
            letter-spacing: 2px;
            /* 強制數字等寬，避免計時跳動時字體寬度變化造成左右晃動 */
            font-variant-numeric: tabular-nums; 
        }

        /* 2分鐘倒數計時器 */
        .countdown-text {
            font-size: clamp(4rem, 15vw, 10rem); 
            font-weight: 300;
            color: #f39c12; /* 使用橘色做視覺區分 */
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
        }

        /* 2.5分鐘倒數計時器 */
        .countdown-text2 {
            font-size: clamp(4rem, 15vw, 10rem); 
            font-weight: 300;
            color: #3498db; /* 使用藍色做視覺區分 */
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
        }

        /* 現在時間 */
        .clock-text {
            font-size: clamp(4rem, 15vw, 10rem); 
            font-weight: 300;
            color: #888888; /* 使用淺灰色做視覺區分 */
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; 
        }

        /* 按鈕控制區 (最下方) */
        .controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* 按鈕之間的間距 */
            padding: 30px 20px 50px 20px; /* 底部保留一點安全空間給手機 */
            background-color: #2a2a2a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        /* 按鈕共用樣式 */
        button {
            flex: 1;
            max-width: 150px; /* PC 上限制最大寬度 */
            padding: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* 個別按鈕顏色 */
        #pauseBtn { background-color: #f39c12; }
        #startBtn { background-color: #27ae60; }
        #resetBtn { background-color: #e74c3c; }

        /* 針對較小螢幕的手機微調 */
        @media (max-width: 350px) {
            button {
                font-size: 1rem;
                padding: 12px 0;
            }
            .controls-container { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="display-container">
        <div class="stopwatch-text" id="display">00:00:00</div>
        <div class="countdown-text" id="countdown">02:00</div>
        <div class="countdown-text2" id="countdown2">02:30</div>
        <div class="clock-text" id="clock">00:00:00</div>
    </div>

    <div class="controls-container">
        <button id="pauseBtn" disabled>暫停</button>
        <button id="startBtn">開始</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        // 取得 DOM 元素
        const display = document.getElementById('display');
        const countdownDisplay = document.getElementById('countdown');
        const countdown2Display = document.getElementById('countdown2');
        const clockDisplay = document.getElementById('clock');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 計時器相關變數
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;

        // ---- 現在時間功能 ----
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockDisplay.textContent = `${hours}:${minutes}:${seconds}`;
        }
        // 啟動現在時間的時鐘 (每秒更新)
        setInterval(updateClock, 1000);
        updateClock(); // 網頁載入時立刻顯示當下時間

        // ---- 碼表與循環倒數功能 ----
        // 格式化時間並更新畫面 
        function updateDisplay(time) {
            // 1. 更新主碼表 (格式: HH:MM:SS)
            const hours = String(Math.floor(time / 3600000)).padStart(2, '0');
            const minutes = String(Math.floor((time % 3600000) / 60000)).padStart(2, '0');
            const seconds = String(Math.floor((time % 60000) / 1000)).padStart(2, '0');
            display.textContent = `${hours}:${minutes}:${seconds}`;

            const totalSecondsPassed = Math.floor(time / 1000); // 經過的總秒數

            // 2. 更新 2 分鐘循環倒數 (格式: MM:SS)
            const cycleSeconds1 = 120; // 2 分鐘 = 120 秒
            const elapsedInCycle1 = totalSecondsPassed % cycleSeconds1;
            const remainingSeconds1 = cycleSeconds1 - elapsedInCycle1;

            const cdMinutes1 = String(Math.floor(remainingSeconds1 / 60)).padStart(2, '0');
            const cdSeconds1 = String(remainingSeconds1 % 60).padStart(2, '0');
            countdownDisplay.textContent = `${cdMinutes1}:${cdSeconds1}`;

            // 3. 更新 2.5 分鐘循環倒數 (格式: MM:SS)
            const cycleSeconds2 = 150; // 2.5 分鐘 = 150 秒
            const elapsedInCycle2 = totalSecondsPassed % cycleSeconds2;
            const remainingSeconds2 = cycleSeconds2 - elapsedInCycle2;

            const cdMinutes2 = String(Math.floor(remainingSeconds2 / 60)).padStart(2, '0');
            const cdSeconds2 = String(remainingSeconds2 % 60).padStart(2, '0');
            countdown2Display.textContent = `${cdMinutes2}:${cdSeconds2}`;
        }

        // 計時器循環函式
        function update() {
            elapsedTime = Date.now() - startTime;
            updateDisplay(elapsedTime);
            // 依然使用 requestAnimationFrame 確保背景計時的準確性
            timerInterval = requestAnimationFrame(update);
        }

        // 開始按鈕邏輯
        function start() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime; 
                timerInterval = requestAnimationFrame(update);
                isRunning = true;
                
                // 按鈕狀態切換
                startBtn.disabled = true;
                pauseBtn.disabled = false;
            }
        }

        // 暫停按鈕邏輯
        function pause() {
            if (isRunning) {
                cancelAnimationFrame(timerInterval);
                isRunning = false;
                
                // 按鈕狀態切換
                startBtn.disabled = false;
                pauseBtn.disabled = true;
            }
        }

        // 重置按鈕邏輯
        function reset() {
            cancelAnimationFrame(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            updateDisplay(elapsedTime);
            
            // 按鈕狀態初始化
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        // 綁定事件監聽器
        startBtn.addEventListener('click', start);
        pauseBtn.addEventListener('click', pause);
        resetBtn.addEventListener('click', reset);
    </script>
</body>
</html>
